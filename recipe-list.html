<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alison's Recipe Share - Recipes</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>Alison's Recipe Share</h1>
      <nav class="site-nav">
        <a id="homeButton" class="nav-link" href="index.html">Home</a>
        <a id="recipeListLink" class="nav-link" href="recipe-list.html">Recipes</a>
        <a id="suggestButton" class="nav-link" href="suggest.html">Suggest</a>
      </nav>
    </header>

    <main class="page">
      <h2 style="margin: 0 0 14px 0;">Recipes</h2>

      <section class="recipes-row" aria-label="Recipe list">
        <button
          class="recipe-card"
          type="button"
          data-title="Stir Fried Rice Cake"
          data-description="A chewy and spicy Korean rice cake stir-fry."
          data-ingredients="Rice cakes, fish cake, gochujang, onion, scallions."
          data-instructions="Soak rice cakes, stir-fry aromatics, add sauce, simmer until glossy."
          data-image="images/ricecake.webp"
        >
          <div class="card-title-placeholder">Rice Cake Stir Fry</div>
          <div aria-label="Rice Cake Stir Fry image">
            <img src="images/ricecake.webp" alt="Rice Cake Stir Fry" class="card-image">
          </div>
        </button>

        <button
          class="recipe-card"
          type="button"
          data-title="Seafood Pajeon"
          data-description="Savory Korean pancake with seafood and green onion."
          data-ingredients="Flour, egg, green onion, shrimp, squid, salt."
          data-instructions="Mix batter, fold in seafood and scallions, pan-fry both sides until crisp."
          data-image="images/pajeon.jpg"
        >
          <div class="card-title-placeholder">Seafood Pajeon</div>
          <div aria-label="Seafood Pajeon image">
            <img src="images/pajeon.jpg" alt="Seafood Pajeon" class="card-image">
          </div>
        </button>

        <button
          class="recipe-card"
          type="button"
          data-title="Kimchi Fried Rice"
          data-description="Quick and savory fried rice with kimchi."
          data-ingredients="Cooked rice, kimchi, sesame oil, soy sauce, egg."
          data-instructions="Saute kimchi, add rice and seasoning, stir-fry hot, top with egg."
          data-image="images/friedrice.webp"
        >
          <div class="card-title-placeholder">Kimchi Fried Rice</div>
          <div aria-label="Kimchi Fried Rice image">
            <img src="images/friedrice.webp" alt="Kimchi Fried Rice" class="card-image">
          </div>
        </button>
      </section>
    </main>

    <script type="module" src="./recipes.js"></script>
  </body>
</html>
